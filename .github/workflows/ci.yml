name: Continuous Integration


on:
  push:
    branches:
      - main
      - master   # <--- Adicione esta linha
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  tests:
    name: Run tests
    runs-on: ubuntu-latest # Este job permanece como está

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pytest pytest-cov
          fi

      - name: Run tests
        run: |
          pytest --cov=src --cov-report=term-missing

  release:
    name: Create Release
    runs-on: ubuntu-latest
    # Condição: executa em push para 'main', 'master' ou 'develop' e após os testes passarem
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop') && github.event_name == 'push'
    needs: tests
    # Permissões necessárias para o token criar releases e commitar o changelog
    permissions:
      contents: write # Para criar/atualizar tags, releases e commitar o CHANGELOG.md
      issues: write # Para comentar em issues/PRs relacionados
      pull-requests: write # Para comentar em issues/PRs relacionados

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessário para analisar todo o histórico de commits

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        env:
          # Token para autenticar no GitHub e criar a release
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
